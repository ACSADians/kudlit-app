<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin:0; padding:0; background: var(--neutral-white); }
  body { padding:20px; }
  .row { display:grid; grid-template-columns: 160px 1fr 120px; gap:16px; align-items:baseline; padding:10px 0; border-bottom:1px dashed var(--border-soft); }
  .row:last-child { border-bottom:none; }
  .tag { font-family:var(--font-mono); font-size:11px; color:var(--grey-200); }
  .spec { font-family:var(--font-mono); font-size:11px; color:var(--grey-300); text-align:right; }
</style>
</head><body>
<div class="row"><span class="tag">body / 16 / 400</span><span class="ds-p">Make sure the text is clear, well-lit, and fully visible.</span><span class="spec">1.5</span></div>
<div class="row"><span class="tag">small / 14 / 400</span><span class="ds-small">Avg Confidence: 87% — Scanned on Tue Apr 23 2026</span><span class="spec">1.5</span></div>
<div class="row"><span class="tag">caption / 12 / 500</span><span class="ds-caption">COMING SOON</span><span class="spec">+0.02em</span></div>
<div class="row"><span class="tag">code / mono 14</span><span class="ds-code">--blue-400: hsl(225, 36%, 39%)</span><span class="spec">mono</span></div>
</body></html>
