<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--neutral-white);}
  body{padding:24px; display:flex; gap:24px; align-items:center; font-family:var(--font-sans);}
  .logo { width:96px; height:96px; border-radius:20px; box-shadow:var(--shadow-card); overflow:hidden; }
  .logo img { width:100%; height:100%; object-fit:cover; display:block; }
  .meta { display:flex; flex-direction:column; gap:4px; }
  .name { font-size:28px; font-weight:700; color:var(--blue-300); letter-spacing:-0.01em; }
  .tag { font-size:13px; color:var(--grey-200); }
  .note { font-size:11px; color:var(--warning-500); font-family:var(--font-mono); }
</style>
</head><body>
<div class="logo"><img src="../assets/BaybayInscribe-AppIcon.webp" alt="Kudlit"></div>
<div class="meta">
  <div class="name">Kudlit</div>
  <div class="tag">Offline-first Baybayin learning &amp; scanning.</div>
  <div class="note">⚑ Using ex-BaybayInscribe icon as placeholder — Kudlit wordmark pending.</div>
</div>
</body></html>
