<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  html,body{margin:0;padding:0;background:var(--neutral-white);}
  body{padding:18px; display:grid; grid-template-columns: repeat(9, 1fr); gap:14px; font-family:var(--font-sans);}
  .ico { display:flex; flex-direction:column; align-items:center; gap:6px; color:var(--blue-300); }
  .ico svg { width:28px; height:28px; stroke-width:1.5; }
  .ico span { font-size:10px; font-family:var(--font-mono); color:var(--grey-200); }
</style>
</head><body>
<div class="ico"><i data-lucide="menu"></i><span>Menu</span></div>
<div class="ico"><i data-lucide="languages"></i><span>Languages</span></div>
<div class="ico"><i data-lucide="scan-text"></i><span>ScanText</span></div>
<div class="ico"><i data-lucide="pencil-ruler"></i><span>PencilRuler</span></div>
<div class="ico"><i data-lucide="bot-message-square"></i><span>BotMsg</span></div>
<div class="ico"><i data-lucide="book-open-text"></i><span>BookOpen</span></div>
<div class="ico"><i data-lucide="list-todo"></i><span>ListTodo</span></div>
<div class="ico"><i data-lucide="users"></i><span>Users</span></div>
<div class="ico"><i data-lucide="clock"></i><span>Clock</span></div>
<div class="ico"><i data-lucide="chevron-right"></i><span>Chevron</span></div>
<div class="ico"><i data-lucide="history"></i><span>History</span></div>
<div class="ico"><i data-lucide="triangle-alert"></i><span>Alert</span></div>
<div class="ico"><i data-lucide="webcam"></i><span>Webcam</span></div>
<div class="ico"><i data-lucide="settings"></i><span>Settings</span></div>
<div class="ico"><i data-lucide="log-out"></i><span>LogOut</span></div>
<div class="ico"><i data-lucide="text-quote"></i><span>Quote</span></div>
<div class="ico"><i data-lucide="user-cog"></i><span>UserCog</span></div>
<div class="ico"><i data-lucide="pencil"></i><span>Pencil</span></div>
<script>lucide.createIcons();</script>
</body></html>
