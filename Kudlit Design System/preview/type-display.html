<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin:0; padding:0; background: var(--neutral-white); }
  body { padding:20px; }
  .row { display:grid; grid-template-columns: 160px 1fr 120px; gap:16px; align-items:baseline; padding:10px 0; border-bottom:1px dashed var(--border-soft); }
  .row:last-child { border-bottom:none; }
  .tag { font-family:var(--font-mono); font-size:11px; color:var(--grey-200); }
  .spec { font-family:var(--font-mono); font-size:11px; color:var(--grey-300); text-align:right; }
</style>
</head><body>
<div class="row"><span class="tag">display / 40 / 700</span><span class="ds-display">Offline-first learning.</span><span class="spec">-0.02em · 1.15</span></div>
<div class="row"><span class="tag">h1 / 32 / 700</span><span class="ds-h1">Guide to Baybayin</span><span class="spec">-0.015em · 1.15</span></div>
<div class="row"><span class="tag">h2 / 24 / 600</span><span class="ds-h2">Baybayin Scanner</span><span class="spec">1.3</span></div>
<div class="row"><span class="tag">h3 / 20 / 600</span><span class="ds-h3">Detected Transliteration</span><span class="spec">1.3</span></div>
</body></html>
