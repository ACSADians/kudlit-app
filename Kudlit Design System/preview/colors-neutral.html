<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin:0; padding:0; background: var(--neutral-white); }
  body { padding:20px; }
  .swatch-row { display:flex; gap:8px; }
  .swatch { flex:1; height:70px; border-radius:10px; padding:8px; color:white; font-size:10px; font-family: var(--font-mono); display:flex; flex-direction:column; justify-content:flex-end; border:1px solid rgba(14,20,37,.06);}
  .swatch .name { font-weight:600; font-size:11px;}
  .label { font-family: var(--font-sans); font-size:11px; color:var(--grey-200); margin:0 0 6px; letter-spacing:.08em; text-transform:uppercase; font-weight:600;}
</style>
</head><body>
<div class="label">Neutral — paper-and-ink</div>
<div class="swatch-row" style="margin-bottom:10px;">
  <div class="swatch" style="background:var(--neutral-white); color:var(--blue-300); border:1px solid var(--border-soft);"><div class="name">neutral-white</div>226 91% 91%</div>
  <div class="swatch" style="background:var(--neutral-black);"><div class="name">neutral-black</div>224 45% 10%</div>
  <div class="swatch" style="background:var(--grey-600); color:var(--grey-100); border:1px solid var(--border-soft);"><div class="name">grey-600</div>20 20% 97%</div>
  <div class="swatch" style="background:var(--grey-500); color:var(--grey-100); border:1px solid var(--border-soft);"><div class="name">grey-500</div>225 25% 94%</div>
  <div class="swatch" style="background:var(--grey-400); color:var(--grey-100);"><div class="name">grey-400</div>233 21% 85%</div>
  <div class="swatch" style="background:var(--grey-300);"><div class="name">grey-300</div>230 18% 50%</div>
  <div class="swatch" style="background:var(--grey-200);"><div class="name">grey-200</div>231 15% 45%</div>
  <div class="swatch" style="background:var(--grey-100);"><div class="name">grey-100</div>231 15% 20%</div>
</div>
</body></html>
