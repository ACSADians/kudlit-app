<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--neutral-white);}
  body{padding:20px; font-family:var(--font-sans); display:flex; gap:28px; align-items:center;}
  .motion { display:flex; flex-direction:column; gap:6px; align-items:center; }
  .box { width:80px; height:60px; background:var(--blue-300); border-radius:var(--radius-md); }
  .shake { animation: shake 1.2s ease-out infinite; }
  .heart { animation: heartbeat 1.5s ease-in-out infinite; background:var(--danger-400); border-radius:50%; width:40px; height:40px; }
  .hover-demo:hover { transform: translateY(-8px); transition: all 500ms cubic-bezier(.16,1,.3,1); }
  .press-demo:active { transform: translateY(0) scale(0.95); box-shadow:none; transition: all 500ms;}
  .lbl { font-family:var(--font-mono); font-size:10px; color:var(--grey-200); }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    10%,30%,50%,70%,90% { transform: translateX(-5px); }
    20%,40%,60%,80% { transform: translateX(5px); }
  }
  @keyframes heartbeat {
    0%,50%,100% { transform: scale(1); }
    25%,75% { transform: scale(1.4); }
  }
</style>
</head><body>
<div class="motion"><div class="box shake"></div><div class="lbl">shake · 0.5s</div></div>
<div class="motion"><div class="heart"></div><div class="lbl">heartbeat · 1.5s ∞</div></div>
<div class="motion"><div class="box hover-demo"></div><div class="lbl">hover · -8y / 500ms</div></div>
<div class="motion"><div class="box press-demo" style="box-shadow:var(--shadow-md);"></div><div class="lbl">press · scale .95</div></div>
</body></html>
