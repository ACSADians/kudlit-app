<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin:0; padding:0; background: var(--neutral-white); }
  body { padding:24px; display:flex; gap:14px; align-items:center; flex-wrap:wrap; font-family:var(--font-sans); }
  .btn { border:0; border-radius:var(--radius-md); padding:10px 18px; font-weight:500; font-size:14px; cursor:pointer; transition: all var(--dur-slow) var(--ease-out); }
  .primary { background: var(--blue-300); color: var(--blue-900); }
  .primary:hover { background: var(--blue-400); color: var(--blue-900); }
  .secondary { background: var(--blue-900); color: var(--blue-400); }
  .ghost { background: transparent; color: var(--blue-300); }
  .pill { border-radius: var(--radius-full); background: var(--blue-500); color:white; padding:8px 18px; }
  .danger { background: var(--danger-400); color:white; }
  .disabled { background: hsla(225, 39%, 53%, .6); color: hsla(227, 92%, 95%, .6); cursor:not-allowed; }
</style>
</head><body>
<button class="btn primary">Start Learning</button>
<button class="btn secondary">Cancel</button>
<button class="btn ghost">See more ›</button>
<button class="btn pill">Take Quiz</button>
<button class="btn danger">Clear History</button>
<button class="btn disabled">Coming Soon</button>
</body></html>
