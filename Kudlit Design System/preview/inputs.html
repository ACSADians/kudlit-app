<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin:0; padding:0; background: var(--neutral-white); }
  body { padding:20px; display:flex; gap:14px; align-items:center; font-family:var(--font-sans); flex-wrap:wrap; }
  .field { display:flex; flex-direction:column; gap:6px; }
  label { font-size:12px; color:var(--grey-200); font-weight:600; }
  input, select { font-family:var(--font-sans); font-size:14px; padding:10px 12px; border-radius:var(--radius-md); border:1.25px solid var(--border); background:white; color:var(--fg); min-width:180px; outline:none; transition: all var(--dur-fast); }
  input:focus { border-color: var(--ring); box-shadow: 0 0 0 3px hsla(225, 36%, 39%, .15); }
  input.error { border-color: var(--danger-400); background: var(--danger-50); }
  .chip { display:inline-flex; align-items:center; padding:4px 12px; border-radius:var(--radius-full); color:white; font-size:12px; font-weight:600; }
</style>
</head><body>
<div class="field"><label>Username</label><input placeholder="@juandelacruz" value="@juandelacruz"></div>
<div class="field"><label>Difficulty</label><input class="error" placeholder="Required"></div>
<div class="field"><label>Status</label>
  <div style="display:flex;gap:6px;">
    <span class="chip" style="background:var(--success-500);">Easy</span>
    <span class="chip" style="background:var(--warning-300);">Moderate</span>
    <span class="chip" style="background:var(--danger-400);">Hard</span>
  </div>
</div>
</body></html>
