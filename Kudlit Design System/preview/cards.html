<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--neutral-white);}
  body{padding:18px; display:flex; gap:16px; font-family:var(--font-sans);}
  .card { width:220px; background:var(--neutral-white); border:1px solid var(--border); border-radius:var(--radius-lg); overflow:hidden; box-shadow: var(--shadow-sm); display:flex; flex-direction:column; }
  .img { height:90px; background:var(--blue-900); display:flex; align-items:center; justify-content:center; }
  .img img { height:72px; }
  .body { padding:10px 12px; }
  .title { font-weight:600; font-size:15px; color:var(--blue-300); margin:0 0 4px; }
  .desc { font-size:12px; color:var(--grey-300); margin:0; line-height:1.4; }
  .btn { margin:0 10px 10px; background:var(--blue-300); color:var(--blue-900); padding:8px 10px; border-radius:var(--radius-md); text-align:center; font-size:13px; font-weight:500; }
  .quiz { background:#dbe3fa; border:1px solid var(--border); border-radius:var(--radius-lg); padding:12px; width:200px; }
  .quiz h3 { margin:0 0 8px; font-size:15px; }
  .quiz .meta { display:flex; justify-content:space-between; align-items:center; font-size:11px; color:var(--grey-200); margin-bottom:10px;}
  .quiz .tag { background:var(--success-500); color:white; padding:2px 10px; border-radius:var(--radius-full); font-size:11px;}
  .quiz .take { background:var(--blue-500); color:white; padding:6px 10px; border-radius:var(--radius-md); text-align:center; font-size:13px; }
</style>
</head><body>
<div class="card">
  <div class="img"><img src="../assets/baybayin.vowels.webp" alt=""></div>
  <div class="body">
    <div class="title">Guide to Vowels</div>
    <p class="desc">Learn the three foundational vowels of Baybayin.</p>
  </div>
  <div class="btn">Start Learning</div>
</div>
<div class="quiz">
  <h3>Vowel Sprint</h3>
  <div class="meta"><span class="tag">Easy</span><span>⏱ 2:00</span><span>Apr 22</span></div>
  <div class="take">Take Quiz</div>
</div>
</body></html>
