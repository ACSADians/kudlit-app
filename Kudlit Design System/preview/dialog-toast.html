<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--neutral-white);}
  body{padding:20px; display:flex; gap:20px; align-items:center; font-family:var(--font-sans);}
  .dialog { width:360px; background:var(--neutral-white); border-radius:var(--radius-xl); border:1px solid var(--border); box-shadow:var(--shadow-lg); overflow:hidden; }
  .hdr { padding:16px 18px 6px; display:flex; align-items:center; gap:10px; color:var(--danger-500); font-weight:700; font-size:16px;}
  .body { padding:6px 18px 14px; font-size:13px; color:var(--grey-100); line-height:1.5; }
  .foot { display:flex; justify-content:flex-end; padding:10px 14px; gap:8px; background:var(--grey-500); }
  .btn { padding:8px 14px; border-radius:var(--radius-md); font-size:13px; font-weight:500; border:0; }
  .p { background:var(--blue-300); color:var(--blue-900); }
  .s { background:transparent; color:var(--grey-200); }
  .toast { background:var(--success-500); color:white; padding:10px 14px; border-radius:var(--radius-md); font-size:13px; font-weight:500; box-shadow:var(--shadow-md); display:flex; align-items:center; gap:8px; }
</style>
</head><body>
<div class="dialog">
  <div class="hdr">⚠ Model Accuracy Notice</div>
  <div class="body">The AI model may not be 100% accurate. Expect occasional misreads and always verify the output.</div>
  <div class="foot"><button class="btn s">No, don't log me out</button><button class="btn p">I Understand</button></div>
</div>
<div class="toast">✓ Lesson saved</div>
</body></html>
