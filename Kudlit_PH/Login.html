<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Kudlit — Login</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<link rel="stylesheet" href="ds/colors_and_type.css" />
<style>
  html, body { margin: 0; padding: 0; min-height: 100vh;
    font-family: 'Geist', ui-sans-serif, system-ui, sans-serif; }
  body {
    background: radial-gradient(ellipse at top,
      hsl(227, 92%, 95%) 0%,
      hsl(226, 91%, 88%) 60%,
      hsl(225, 39%, 75%) 100%);
    min-height: 100vh;
    display: flex; justify-content: center; align-items: center;
    padding: 40px 20px; box-sizing: border-box;
  }
  .stage { display: flex; flex-direction: column; align-items: center; gap: 14px; }
  .label {
    font-size: 11px; color: hsl(226, 65%, 25%);
    font-weight: 500; opacity: .7;
    letter-spacing: .08em; text-transform: uppercase;
  }
  /* AndroidDevice default has overflow:auto on the content wrapper;
     we want no scroll on the login itself. */
  .stage .no-scroll > div > div[style*="overflow: auto"] {
    overflow: hidden !important;
  }
</style>
</head>
<body>

<div id="root" class="stage"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

<script type="text/babel" src="android-frame.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="LoginScreen.jsx"></script>

<script type="text/babel">
  const { useEffect } = React;

  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
    "primaryMethod": "phone",
    "colorScheme": "light",
    "buttyPose": "wave",
    "heroHeightPct": 49,
    "buttySize": 130,
    "showBubble": true,
    "showGlyphs": true,
    "headline": "Welcome, ka-Baybayin!",
    "subhead": "Sign in to save your progress and earn badges.",
    "bubbleText": "Kumusta! I'm Butty. Let's learn Baybayin together!"
  }/*EDITMODE-END*/;

  function App() {
    const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);

    // re-render lucide icons whenever tweaks change
    useEffect(() => {
      if (window.lucide) setTimeout(() => window.lucide.createIcons(), 30);
    }, [t]);

    return (
      <React.Fragment>
        <div className="no-scroll">
          <AndroidDevice width={400} height={860} dark={true}>
            <LoginScreen t={t} />
          </AndroidDevice>
        </div>
        <div className="label">Pixel · 400 × 860 · Kudlit Login</div>

        <TweaksPanel title="Tweaks">
          <TweakSection label="Layout">
            <TweakRadio label="Primary auth"
              value={t.primaryMethod}
              options={['phone', 'email', 'google']}
              onChange={v => setTweak('primaryMethod', v)} />
            <TweakRadio label="Color"
              value={t.colorScheme}
              options={['dark', 'light']}
              onChange={v => setTweak('colorScheme', v)} />
            <TweakSlider label="Hero height" unit="%"
              value={t.heroHeightPct} min={38} max={62} step={1}
              onChange={v => setTweak('heroHeightPct', v)} />
          </TweakSection>

          <TweakSection label="Mascot">
            <TweakRadio label="Pose"
              value={t.buttyPose}
              options={['wave', 'read', 'bubble']}
              onChange={v => setTweak('buttyPose', v)} />
            <TweakSlider label="Butty size" unit="px"
              value={t.buttySize} min={90} max={170} step={2}
              onChange={v => setTweak('buttySize', v)} />
            <TweakToggle label="Speech bubble"
              value={t.showBubble}
              onChange={v => setTweak('showBubble', v)} />
            <TweakToggle label="Baybayin glyphs"
              value={t.showGlyphs}
              onChange={v => setTweak('showGlyphs', v)} />
          </TweakSection>

          <TweakSection label="Copy">
            <TweakText label="Headline"
              value={t.headline}
              onChange={v => setTweak('headline', v)} />
            <TweakText label="Subhead"
              value={t.subhead}
              onChange={v => setTweak('subhead', v)} />
            <TweakText label="Bubble"
              value={t.bubbleText}
              onChange={v => setTweak('bubbleText', v)} />
          </TweakSection>
        </TweaksPanel>
      </React.Fragment>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
